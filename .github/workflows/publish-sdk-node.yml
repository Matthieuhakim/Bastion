name: Publish Node SDK

on:
  release:
    types:
      - published

jobs:
  publish:
    name: Publish @bastion-ai/sdk
    if: startsWith(github.event.release.tag_name, 'sdk-node-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Node SDK
        run: npm run build --workspace=packages/sdk-node

      - name: Publish package
        working-directory: packages/sdk-node
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish
