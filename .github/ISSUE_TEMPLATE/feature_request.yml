name: Feature request
description: Suggest a new capability or improvement
title: '[Feature]: '
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please focus on the user problem first, then the proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Explain the use case or pain point.
      placeholder: I'm trying to ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
      placeholder: Bastion could ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share any workarounds or other approaches you looked at.

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Links, mockups, docs, or examples from related tools.
